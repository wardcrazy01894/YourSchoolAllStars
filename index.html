<!doctype html>

    <link
      rel="canonical"

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="YourSchoolAllStars" />

      property="og:title"
      content="YourSchoolAllStars — build your school's all-time team"

    <meta

      name="twitter:title"
      content="YourSchoolAllStars — build your school's all-time team"

      name="twitter:image"
